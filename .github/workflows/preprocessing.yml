name: Preprocessing Automated Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Generate Dataset (if not present)
        run: |
          python generate_dataset.py

      - name: Run Automate Preprocessing
        run: |
          python preprocessing/automate_Ragil-Amirzaky.py

      - name: Upload Preprocessed Dataset Artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/credit_scoring_preprocessing.csv
